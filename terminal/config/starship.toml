add_newline = true
command_timeout = 2000

[git_status]
ignore_submodules = true
format = '([$ahead_behind$stashed$conflicted$staged$modified$untracked$renamed$deleted]($style))'
up_to_date = ''
ahead = '[⇡$count ](76)'
behind = '[⇣$count ](76)'
diverged = '[⇕⇡$ahead_count⇣$behind_count ](76)'
stashed = '[*$count ](76)'
conflicted = '[~$count ](196)'
staged = '[+$count ](178)'
modified = '[!$count ](178)'
untracked = '[?$count ](39)'
renamed = '[»$count ](178)'
deleted = '[✘$count ](196)'
